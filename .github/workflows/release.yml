name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Configure native Surevideotool camera build
      shell: pwsh
      run: cmake -S native-camera -B native-camera/build -A x64

    - name: Build native Surevideotool camera artifacts
      shell: pwsh
      run: cmake --build native-camera/build --config Release

    - name: Install dependencies
      working-directory: app
      run: npm ci

    - name: Prepare release env
      working-directory: app
      shell: pwsh
      env:
        VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL || vars.SUPABASE_URL || secrets.SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
        VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}
        SUPABASE_URL: ${{ vars.SUPABASE_URL || secrets.SUPABASE_URL || vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY || vars.SUPABASE_SERVICE_KEY || vars.SUPABASE_SERVICE_ROLE_KEY }}
        DECART_API_KEY: ${{ secrets.DECART_API_KEY || vars.DECART_API_KEY }}
        PAYMENTPOINT_API_KEY: ${{ secrets.PAYMENTPOINT_API_KEY || vars.PAYMENTPOINT_API_KEY }}
        PAYMENTPOINT_SECRET_KEY: ${{ secrets.PAYMENTPOINT_SECRET_KEY || vars.PAYMENTPOINT_SECRET_KEY || secrets.PAYMENTPOINT_WEBHOOK_SECRET || vars.PAYMENTPOINT_WEBHOOK_SECRET || secrets.PAYMENTPOINT_SECURITY_KEY || vars.PAYMENTPOINT_SECURITY_KEY }}
        PAYMENTPOINT_BUSINESS_ID: ${{ secrets.PAYMENTPOINT_BUSINESS_ID || vars.PAYMENTPOINT_BUSINESS_ID || secrets.PAYMENTPOINT_API_KEY || vars.PAYMENTPOINT_API_KEY }}
        PAYMENTPOINT_BANK_CODES: ${{ secrets.PAYMENTPOINT_BANK_CODES || vars.PAYMENTPOINT_BANK_CODES }}
        VITE_PAYMENTPOINT_CHECKOUT_URL: ${{ vars.VITE_PAYMENTPOINT_CHECKOUT_URL || secrets.VITE_PAYMENTPOINT_CHECKOUT_URL || vars.VITE_PAYMENTPOINT_URL || secrets.VITE_PAYMENTPOINT_URL || vars.PAYMENTPOINT_CHECKOUT_URL || secrets.PAYMENTPOINT_CHECKOUT_URL }}
        VITE_PAYMENTPOINT_ACCOUNT_NAME: ${{ vars.VITE_PAYMENTPOINT_ACCOUNT_NAME || secrets.VITE_PAYMENTPOINT_ACCOUNT_NAME || vars.PAYMENTPOINT_ACCOUNT_NAME || secrets.PAYMENTPOINT_ACCOUNT_NAME }}
        VITE_PAYMENTPOINT_ACCOUNT_NUMBER: ${{ vars.VITE_PAYMENTPOINT_ACCOUNT_NUMBER || secrets.VITE_PAYMENTPOINT_ACCOUNT_NUMBER || vars.PAYMENTPOINT_ACCOUNT_NUMBER || secrets.PAYMENTPOINT_ACCOUNT_NUMBER }}
        VITE_PAYMENTPOINT_BANK_NAME: ${{ vars.VITE_PAYMENTPOINT_BANK_NAME || secrets.VITE_PAYMENTPOINT_BANK_NAME || vars.PAYMENTPOINT_BANK_NAME || secrets.PAYMENTPOINT_BANK_NAME }}
      run: |
        $optional = @{
          VITE_SUPABASE_URL = $env:VITE_SUPABASE_URL
          VITE_SUPABASE_ANON_KEY = $env:VITE_SUPABASE_ANON_KEY
          SUPABASE_URL = $env:SUPABASE_URL
          SUPABASE_SERVICE_KEY = $env:SUPABASE_SERVICE_KEY
          DECART_API_KEY = $env:DECART_API_KEY
          PAYMENTPOINT_API_KEY = $env:PAYMENTPOINT_API_KEY
          PAYMENTPOINT_SECRET_KEY = $env:PAYMENTPOINT_SECRET_KEY
          PAYMENTPOINT_BUSINESS_ID = $env:PAYMENTPOINT_BUSINESS_ID
          PAYMENTPOINT_BANK_CODES = $env:PAYMENTPOINT_BANK_CODES
          VITE_PAYMENTPOINT_CHECKOUT_URL = $env:VITE_PAYMENTPOINT_CHECKOUT_URL
          VITE_PAYMENTPOINT_ACCOUNT_NAME = $env:VITE_PAYMENTPOINT_ACCOUNT_NAME
          VITE_PAYMENTPOINT_ACCOUNT_NUMBER = $env:VITE_PAYMENTPOINT_ACCOUNT_NUMBER
          VITE_PAYMENTPOINT_BANK_NAME = $env:VITE_PAYMENTPOINT_BANK_NAME
        }

        $missingOptional = $optional.GetEnumerator() | Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } | ForEach-Object { $_.Key }
        if ($missingOptional.Count -gt 0) {
          Write-Host "Continuing without optional release env values: $($missingOptional -join ', ')"
        }

        if ([string]::IsNullOrWhiteSpace($env:VITE_API_URL)) {
          $env:VITE_API_URL = "/api"
        }

        @(
          "VITE_SUPABASE_URL=$env:VITE_SUPABASE_URL"
          "VITE_SUPABASE_ANON_KEY=$env:VITE_SUPABASE_ANON_KEY"
          "SUPABASE_URL=$env:SUPABASE_URL"
          "SUPABASE_SERVICE_KEY=$env:SUPABASE_SERVICE_KEY"
          "VITE_API_URL=$env:VITE_API_URL"
          "DECART_API_KEY=$env:DECART_API_KEY"
          "PAYMENTPOINT_API_KEY=$env:PAYMENTPOINT_API_KEY"
          "PAYMENTPOINT_SECRET_KEY=$env:PAYMENTPOINT_SECRET_KEY"
          "PAYMENTPOINT_BUSINESS_ID=$env:PAYMENTPOINT_BUSINESS_ID"
          "PAYMENTPOINT_BANK_CODES=$env:PAYMENTPOINT_BANK_CODES"
          "VITE_PAYMENTPOINT_CHECKOUT_URL=$env:VITE_PAYMENTPOINT_CHECKOUT_URL"
          "VITE_PAYMENTPOINT_ACCOUNT_NAME=$env:VITE_PAYMENTPOINT_ACCOUNT_NAME"
          "VITE_PAYMENTPOINT_ACCOUNT_NUMBER=$env:VITE_PAYMENTPOINT_ACCOUNT_NUMBER"
          "VITE_PAYMENTPOINT_BANK_NAME=$env:VITE_PAYMENTPOINT_BANK_NAME"
        ) | Set-Content -Path .env -Encoding ascii

    - name: Build Electron app
      working-directory: app
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SUREVIDEOTOOL_NATIVE_BUILD_DIR: ../native-camera/build
        VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL || vars.SUPABASE_URL || secrets.SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
        VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}
        PAYMENTPOINT_API_KEY: ${{ secrets.PAYMENTPOINT_API_KEY || vars.PAYMENTPOINT_API_KEY }}
        PAYMENTPOINT_SECRET_KEY: ${{ secrets.PAYMENTPOINT_SECRET_KEY || vars.PAYMENTPOINT_SECRET_KEY || secrets.PAYMENTPOINT_WEBHOOK_SECRET || vars.PAYMENTPOINT_WEBHOOK_SECRET || secrets.PAYMENTPOINT_SECURITY_KEY || vars.PAYMENTPOINT_SECURITY_KEY }}
        PAYMENTPOINT_BUSINESS_ID: ${{ secrets.PAYMENTPOINT_BUSINESS_ID || vars.PAYMENTPOINT_BUSINESS_ID || secrets.PAYMENTPOINT_API_KEY || vars.PAYMENTPOINT_API_KEY }}
        PAYMENTPOINT_BANK_CODES: ${{ secrets.PAYMENTPOINT_BANK_CODES || vars.PAYMENTPOINT_BANK_CODES }}
        VITE_PAYMENTPOINT_CHECKOUT_URL: ${{ vars.VITE_PAYMENTPOINT_CHECKOUT_URL || secrets.VITE_PAYMENTPOINT_CHECKOUT_URL || vars.VITE_PAYMENTPOINT_URL || secrets.VITE_PAYMENTPOINT_URL || vars.PAYMENTPOINT_CHECKOUT_URL || secrets.PAYMENTPOINT_CHECKOUT_URL }}
        VITE_PAYMENTPOINT_ACCOUNT_NAME: ${{ vars.VITE_PAYMENTPOINT_ACCOUNT_NAME || secrets.VITE_PAYMENTPOINT_ACCOUNT_NAME || vars.PAYMENTPOINT_ACCOUNT_NAME || secrets.PAYMENTPOINT_ACCOUNT_NAME }}
        VITE_PAYMENTPOINT_ACCOUNT_NUMBER: ${{ vars.VITE_PAYMENTPOINT_ACCOUNT_NUMBER || secrets.VITE_PAYMENTPOINT_ACCOUNT_NUMBER || vars.PAYMENTPOINT_ACCOUNT_NUMBER || secrets.PAYMENTPOINT_ACCOUNT_NUMBER }}
        VITE_PAYMENTPOINT_BANK_NAME: ${{ vars.VITE_PAYMENTPOINT_BANK_NAME || secrets.VITE_PAYMENTPOINT_BANK_NAME || vars.PAYMENTPOINT_BANK_NAME || secrets.PAYMENTPOINT_BANK_NAME }}
      run: npm run electron:build

    - name: Resolve release version
      id: release-version
      working-directory: app
      shell: pwsh
      run: |
        $packageVersion = (Get-Content package.json | ConvertFrom-Json).version

        if ("${{ github.ref_type }}" -eq "tag") {
          $tagName = "${{ github.ref_name }}"
          $tagVersion = $tagName.TrimStart('v')

          if ($tagVersion -ne $packageVersion) {
            throw "Tag $tagName does not match app/package.json version $packageVersion. Update the app version before creating the tag."
          }

          $version = $tagVersion
        } else {
          $version = $packageVersion
          $tagName = "v$packageVersion"
        }

        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "TAG_NAME=$tagName" >> $env:GITHUB_OUTPUT

    - name: Verify release artifacts
      shell: pwsh
      run: |
        $version = "${{ steps.release-version.outputs.VERSION }}"
        $dir = "app/release"

        if (!(Test-Path $dir)) { throw "Missing output directory: $dir" }

        $blockmaps = Get-ChildItem -Path $dir -Filter "*.blockmap" -ErrorAction SilentlyContinue
        if (!$blockmaps) { throw "Missing .blockmap files in $dir" }

        $installerCandidates = @(
          (Join-Path $dir "Surevideotool-Setup-$version.exe"),
          (Join-Path $dir "Surevideotool Setup $version.exe")
        )
        $portableCandidates = @(
          (Join-Path $dir "Surevideotool-$version.exe"),
          (Join-Path $dir "Surevideotool $version.exe")
        )

        $exe1 = $installerCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
        $exe2 = $portableCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

        if (!$exe1) { throw "Missing installer. Checked: $($installerCandidates -join ', ')" }
        if (!$exe2) { throw "Missing portable build. Checked: $($portableCandidates -join ', ')" }

        $bundledCameraDir = Join-Path $dir "win-unpacked/resources/surevideotool-cam"
        if (!(Test-Path $bundledCameraDir)) { throw "Missing bundled camera directory: $bundledCameraDir" }

        $expectedArtifacts = @(
          "SurevideotoolVirtualCamera.dll",
          "surevideotool_cam_registrar.exe",
          "surevideotool_cam_pipe_publisher.exe"
        )

        foreach ($artifact in $expectedArtifacts) {
          $artifactPath = Join-Path $bundledCameraDir $artifact
          if (!(Test-Path $artifactPath)) { throw "Missing bundled camera artifact: $artifactPath" }
        }

    - name: Publish GitHub release assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release-version.outputs.TAG_NAME }}
        name: ${{ steps.release-version.outputs.TAG_NAME }}
        generate_release_notes: true
        fail_on_unmatched_files: true
        files: |
          app/release/*.exe
          app/release/*.blockmap
          app/release/latest*.yml
          app/release/latest*.yaml
